<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora — Your Library</title>
  <link rel="stylesheet" href="../static/css/biblioteca.css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    @font-face {
      font-family: 'Alte Haas Grotesk';
      font-weight: 100 900;
      src: url('https://db.onlinewebfonts.com/c/18a3c52865c8a23a8db0e67a1cd3f106?family=Alte+Haas+Grotesk') format('woff2'),
        url('https://db.onlinewebfonts.com/c/18a3c52865c8a23a8db0e67a1cd3f106?family=Alte+Haas+Grotesk') format('woff');
    }
  </style>


</head>

<body>


  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="app">


    <aside class="sidebar">
      <a href="homepage" class="sidebar-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24">
            <path d="M9 18V5l12-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="18" cy="16" r="3" />
          </svg>
        </div>
        <span class="logo-text">Aurora</span>
      </a>

      <nav class="sidebar-nav">
        <a href="homepage" class="nav-item">
          <svg viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          Home
        </a>
        <a href="homepage" class="nav-item">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          Pesquisar
        </a>
      </nav>

      <div class="sidebar-divider"></div>

      
      <div class="library-panel">
        <div class="lib-header">
          <span class="lib-title">Sua biblioteca</span>
          <div class="lib-actions">
            <button class="icon-btn" title="View options">
              <svg viewBox="0 0 24 24">
                <line x1="8" y1="6" x2="21" y2="6" />
                <line x1="8" y1="12" x2="21" y2="12" />
                <line x1="8" y1="18" x2="21" y2="18" />
                <line x1="3" y1="6" x2="3.01" y2="6" />
                <line x1="3" y1="12" x2="3.01" y2="12" />
                <line x1="3" y1="18" x2="3.01" y2="18" />
              </svg>
            </button>
            <button class="add-btn" title="Create playlist" onclick="openModal()">
              <svg viewBox="0 0 24 24">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
            </button>
          </div>
        </div>

        
        <div class="filter-pills">
          <button class="pill active" data-filter="all">Tudo</button>
          <button class="pill" data-filter="playlist">Playlists</button>
          <button class="pill" data-filter="album">Albuns</button>
        </div>

        
        <div class="search-bar">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input id="sidebarSearch" type="text" placeholder="Pesquisar na biblioteca" oninput="filterAll()" />
          <button class="search-close" onclick="clearSearch()">
            <svg viewBox="0 0 24 24">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        
        <div class="sort-row">
          <span class="sort-label" id="countLabel">8 playlists</span>
          <button class="sort-btn" onclick="toggleSort()">
            <span id="sortLabel">Adicionadas recentemente</span>
            <svg viewBox="0 0 24 24">
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="6" y1="12" x2="18" y2="12" />
              <line x1="9" y1="18" x2="15" y2="18" />
            </svg>
          </button>
        </div>

        
        <div class="playlist-list" id="sidebarList"></div>
        <div class="empty-state" id="sidebarEmpty">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <p>Nenhum resultado encontrado.</p>
        </div>
      </div>
    </aside>

    
    <main class="main">
      <div class="main-header">
        <h1 class="main-title">Sua <span>Biblioteca</span></h1>
        <button class="new-playlist-btn" onclick="openModal()">
          <svg viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Nova Playlist
        </button>
      </div>

      <div class="grid" id="mainGrid">
       
        <div class="grid-empty" id="gridEmpty">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <h3>Sem resultados.</h3>
          <p>Tente um termo de busca ou filtro diferente.</p>
        </div>
      </div>
    </main>
  </div>

 
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 class="modal-title">Criar Playlist</h2>

      <div class="cover-picker">
        <div class="cover-preview" id="coverPreview" title="Escolha a cor da capa">
          <img id="coverImg" src="" alt="cover" />
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg>
          <span>Adicionar capa</span>
        </div>
        <div class="color-swatches" id="swatches"></div>
      </div>

      <div class="modal-field">
        <label for="plName">Nome da Playlist</label>
        <input id="plName" type="text" placeholder="Minha Playlist #9" maxlength="60" />
      </div>
      <div class="modal-field">
        <label for="plDesc">Descrição <span style="color:var(--text-faint);font-weight:400">(opcional)</span></label>
        <textarea id="plDesc" rows="2" placeholder="Adicione uma descição da sua playlist…"></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-create" onclick="createPlaylist()">Criar</button>
      </div>
    </div>
  </div>

  
  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24">
      <polyline points="20 6 9 17 4 12" />
    </svg>
    <span id="toastMsg">Playlist criada!</span>
  </div>

  <script src="../static/js/biblioteca.js"></script>
</body>

</html>
