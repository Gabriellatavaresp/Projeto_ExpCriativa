<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora — Biblioteca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Syne:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/biblioteca.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
  <script src="/static/js/aurora_swal.js"></script>
</head>

<body>


  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="app">


    <aside class="sidebar">
      <a href="/home" class="sidebar-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24">
            <path d="M9 18V5l12-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="18" cy="16" r="3" />
          </svg>
        </div>
        <span class="logo-text">Aurora</span>
      </a>

      <nav class="sidebar-nav">
        <a href="/home" class="nav-item">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </a>
        <a href="/biblioteca" class="nav-item active">
          <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
          Biblioteca
        </a>
        <a href="/curtidas" class="nav-item">
          <svg viewBox="0 0 24 24"><path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3z"/></svg>
          Curtidas
        </a>
        <a href="/playlist" class="nav-item">
          <svg viewBox="0 0 24 24"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
          Playlists
        </a>
        <a href="/perfil" class="nav-item">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
          Perfil
        </a>
      </nav>

      <div class="sidebar-divider"></div>

      
      <div class="library-panel">
        <div class="lib-header">
          <span class="lib-title">Sua biblioteca</span>
          <div class="lib-actions">
            <button class="icon-btn" title="View options">
              <svg viewBox="0 0 24 24">
                <line x1="8" y1="6" x2="21" y2="6" />
                <line x1="8" y1="12" x2="21" y2="12" />
                <line x1="8" y1="18" x2="21" y2="18" />
                <line x1="3" y1="6" x2="3.01" y2="6" />
                <line x1="3" y1="12" x2="3.01" y2="12" />
                <line x1="3" y1="18" x2="3.01" y2="18" />
              </svg>
            </button>
            <button class="add-btn" title="Create playlist" onclick="openModal()">
              <svg viewBox="0 0 24 24">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
            </button>
          </div>
        </div>

        
        <div class="filter-pills">
          <button class="pill active" data-filter="all">Tudo</button>
          <button class="pill" data-filter="playlist">Playlists</button>
          <button class="pill" data-filter="album">Albuns</button>
        </div>

        
        <div class="search-bar">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input id="sidebarSearch" type="text" placeholder="Pesquisar na biblioteca" oninput="filterAll()" />
          <button class="search-close" onclick="clearSearch()">
            <svg viewBox="0 0 24 24">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        
        <div class="sort-row">
          <span class="sort-label" id="countLabel">0 playlists</span>
          <button class="sort-btn" onclick="toggleSort()">
            <span id="sortLabel">Adicionadas recentemente</span>
            <svg viewBox="0 0 24 24">
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="6" y1="12" x2="18" y2="12" />
              <line x1="9" y1="18" x2="15" y2="18" />
            </svg>
          </button>
        </div>

        
        <div class="playlist-list" id="sidebarList"></div>
        <div class="empty-state" id="sidebarEmpty">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <p>Nenhum resultado encontrado.</p>
        </div>
      </div>

      <div style="padding:12px 16px;border-top:1px solid rgba(255,255,255,0.07);margin-top:auto">
        <span id="sidebarNomeUsuario" style="display:block;color:#ccc;font-size:0.85rem;margin-bottom:6px"></span>
        <a href="/logout" style="color:#f87171;font-size:0.85rem;text-decoration:none">Sair</a>
      </div>
    </aside>

    
    <main class="main">
      <div class="main-header">
        <h1 class="main-title">Sua <span>Biblioteca</span></h1>
        <button class="new-playlist-btn" onclick="openModal()">
          <svg viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Nova Playlist
        </button>
      </div>

      <div class="grid" id="mainGrid">
       
        <div class="grid-empty" id="gridEmpty">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <h3>Sem resultados.</h3>
          <p>Tente um termo de busca ou filtro diferente.</p>
        </div>
      </div>
    </main>
  </div>

 
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 class="modal-title">Criar Playlist</h2>

      <div class="cover-picker">
        <div class="cover-preview" id="coverPreview" title="Escolha a cor da capa">
          <img id="coverImg" src="" alt="cover" />
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg>
          <span>Adicionar capa</span>
        </div>
        <div class="color-swatches" id="swatches"></div>
      </div>

      <div class="modal-field">
        <label for="plName">Nome da Playlist</label>
        <input id="plName" type="text" placeholder="Minha Playlist #9" maxlength="60" />
      </div>
      <div class="modal-field">
        <label for="plDesc">Descrição <span style="color:var(--text-faint);font-weight:400">(opcional)</span></label>
        <textarea id="plDesc" rows="2" placeholder="Adicione uma descição da sua playlist…"></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-create" onclick="createPlaylist()">Criar</button>
      </div>
    </div>
  </div>

  
  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24">
      <polyline points="20 6 9 17 4 12" />
    </svg>
    <span id="toastMsg">Playlist criada!</span>
  </div>

  <script src="/static/js/session_guard.js"></script>
  <script src="/static/js/player.js?v=5"></script>
  <script src="/static/js/biblioteca.js"></script>
  <script>
    fetch('/api/me').then(r => r.json()).then(d => {
      const u = d.data;
      window._userId = u.id_usuario;
      document.getElementById('sidebarNomeUsuario').textContent = u.nome + (u.is_admin ? ' (admin)' : '');
    });
  </script>
</body>

</html>
