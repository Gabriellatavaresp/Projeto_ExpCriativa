<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora — Meu Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Syne:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/biblioteca.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
  <script src="/static/js/aurora_swal.js"></script>
  <style>
    .main { overflow-y: auto !important; height: 100vh; padding-bottom: 48px; }
    .perfil-card { background:#1a1a2e; border:1px solid #2a2a3e; border-radius:16px; padding:32px; max-width:560px; }
    .perfil-avatar { width:88px; height:88px; border-radius:50%; background:linear-gradient(135deg,#6b9997,#4e7f82); display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:700; color:#fff; margin-bottom:20px; overflow:hidden; cursor:pointer; position:relative; }
    .perfil-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .perfil-avatar:hover::after { content:'📷'; position:absolute; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; border-radius:50%; font-size:1.5rem; }
    .field-group { display:flex; flex-direction:column; gap:6px; margin-bottom:18px; }
    .field-group label { font-size:0.8rem; color:#888; text-transform:uppercase; letter-spacing:.05em; }
    .field-group input { background:#12121e; border:1px solid #2a2a3e; border-radius:10px; padding:10px 14px; color:#e8e8f0; font-size:0.95rem; outline:none; transition:border .2s; }
    .field-group input:focus { border-color:#6b9997; }
    .field-group input[readonly] { opacity:.5; cursor:not-allowed; }
    .btn-save { background:linear-gradient(135deg,#6b9997,#4e7f82); color:#fff; border:none; border-radius:10px; padding:11px 28px; font-size:0.95rem; font-weight:600; cursor:pointer; margin-top:4px; }
    .btn-save:hover { opacity:.88; }
    .stat-row { display:flex; gap:16px; margin-bottom:28px; flex-wrap:wrap; }
    .stat-box { background:#1a1a2e; border:1px solid #2a2a3e; border-radius:12px; padding:16px 24px; text-align:center; flex:1; min-width:100px; }
    .stat-box strong { display:block; font-size:1.6rem; color:#6b9997; }
    .stat-box span { font-size:0.8rem; color:#888; }
    .section-title { font-family:'Syne',sans-serif; font-size:1.1rem; color:#e8e8f0; margin-bottom:16px; }
  </style>
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="app">
    <aside class="sidebar">
      <a href="/home" class="sidebar-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        </div>
        <span class="logo-text">Aurora</span>
      </a>
      <nav class="sidebar-nav">
        <a href="/home" class="nav-item">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
        </a>
        <a href="/biblioteca" class="nav-item">
          <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>Biblioteca
        </a>
        <a href="/curtidas" class="nav-item">
          <svg viewBox="0 0 24 24"><path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3z"/></svg>
          Curtidas
        </a>

        <a href="/perfil" class="nav-item active">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
          Perfil
        </a>
      </nav>
      <div style="padding:12px 16px;border-top:1px solid rgba(255,255,255,0.07);margin-top:auto">
        <span id="sidebarNome" style="display:block;color:#ccc;font-size:0.85rem;margin-bottom:6px"></span>
        <a href="/logout" style="color:#f87171;font-size:0.85rem;text-decoration:none">Sair</a>
      </div>
    </aside>

    <main class="main">
      <div class="main-header">
        <h1 class="main-title">Meu <span>Perfil</span></h1>
      </div>

      <div class="stat-row" id="statRow">
        <div class="stat-box"><strong id="statPlaylists">—</strong><span>Playlists</span></div>
        <div class="stat-box"><strong id="statCurtidas">—</strong><span>Curtidas</span></div>
        <div class="stat-box"><strong id="statHistorico">—</strong><span>Músicas ouvidas</span></div>
      </div>

      <div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap">

      <div style="flex:1;min-width:280px">
      <p class="section-title">Dados pessoais</p>
      <div class="perfil-card">
        <label>
          <div class="perfil-avatar" id="avatarEl" title="Clique para trocar a foto"></div>
          <input type="file" id="fotoInput" accept="image/*" style="display:none" onchange="uploadFoto(this)">
        </label>

        <div class="field-group">
          <label>Nome completo</label>
          <input type="text" id="fNome" />
        </div>
        <div class="field-group">
          <label>Email</label>
          <input type="email" id="fEmail" />
        </div>
        <div class="field-group">
          <label>Username</label>
          <input type="text" id="fUsername" />
        </div>
        <div class="field-group">
          <label>CPF (não editável)</label>
          <input type="text" id="fCpf" readonly />
        </div>
        <button class="btn-save" onclick="salvarPerfil()">Salvar alterações</button>
      </div>
      </div>

      <div style="flex:1;min-width:280px">
      <p class="section-title">Alterar senha</p>
      <div class="perfil-card">
        <div class="field-group">
          <label>Nova senha</label>
          <input type="password" id="fSenha" placeholder="Mínimo 8 caracteres" />
        </div>
        <div class="field-group">
          <label>Confirmar nova senha</label>
          <input type="password" id="fSenhaConfirm" placeholder="Repita a senha" />
        </div>
        <button class="btn-save" onclick="alterarSenha()">Alterar senha</button>
      </div>
      </div>

      </div>
    </main>
  </div>

  <script src="/static/js/session_guard.js"></script>
  <script src="/static/js/player.js?v=5"></script>
  <script src="/static/js/perfil.js"></script>
</body>
</html>
