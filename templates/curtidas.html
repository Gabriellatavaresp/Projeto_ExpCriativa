<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora — Curtidas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Syne:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/biblioteca.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
  <script src="/static/js/aurora_swal.js"></script>
</head>
<body>

  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="app">
    <aside class="sidebar">
      <a href="/home" class="sidebar-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        </div>
        <span class="logo-text">Aurora</span>
      </a>

      <nav class="sidebar-nav">
        <a href="/home" class="nav-item">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </a>
        <a href="/biblioteca" class="nav-item">
          <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
          Biblioteca
        </a>
        <a href="/playlist" class="nav-item">
          <svg viewBox="0 0 24 24"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
          Playlists
        </a>
        <a href="/curtidas" class="nav-item active">
          <svg viewBox="0 0 24 24"><path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3z"/></svg>
          Curtidas
        </a>
        <a href="/perfil" class="nav-item">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
          Perfil
        </a>
      </nav>

      <div style="padding:12px 16px;border-top:1px solid rgba(255,255,255,0.07);margin-top:auto">
        <span id="sidebarNomeUsuario" style="display:block;color:#ccc;font-size:0.85rem;margin-bottom:6px"></span>
        <a href="/logout" style="color:#f87171;font-size:0.85rem;text-decoration:none">Sair</a>
      </div>
    </aside>

    <main class="main">
      <div class="main-header">
        <h1 class="main-title">Músicas <span>Curtidas</span></h1>
        <p style="color:#888;margin-top:4px" id="totalCurtidas"></p>
      </div>

      <div style="margin-top:16px">
        <input id="searchInput" type="text" placeholder="Filtrar músicas..." oninput="filterMusicas()"
          style="background:#1e1e2e;border:1px solid #333;border-radius:10px;padding:10px 16px;color:#fff;font-size:0.9rem;width:100%;max-width:360px;outline:none;" />
      </div>

      <div style="margin-top:24px;overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:0.9rem" id="curtidasTable">
          <thead>
            <tr style="color:#888;border-bottom:1px solid #2a2a3e;text-align:left">
              <th style="padding:10px 8px">#</th>
              <th style="padding:10px 8px">Título</th>
              <th style="padding:10px 8px">Artista</th>
              <th style="padding:10px 8px">Duração</th>
              <th style="padding:10px 8px">Curtido em</th>
              <th style="padding:10px 8px"></th>
            </tr>
          </thead>
          <tbody id="curtidasBody"></tbody>
        </table>
        <p id="emptyMsg" style="display:none;color:#666;text-align:center;padding:48px">
          Você ainda não curtiu nenhuma música.<br>
          <a href="/biblioteca" style="color:#6b9997">Explorar músicas</a>
        </p>
      </div>
    </main>
  </div>

  <script src="/static/js/session_guard.js"></script>
  <script src="/static/js/player.js?v=5"></script>
  <script src="/static/js/curtidas.js"></script>
  <script>
    fetch('/api/me').then(r => r.json()).then(d => {
      const u = d.data;
      window._userId = u.id_usuario;
      document.getElementById('sidebarNomeUsuario').textContent = u.nome;
    });
  </script>
</body>
</html>
