<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora - Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Syne:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/homepage.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
  <script src="/static/js/aurora_swal.js"></script>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>


  <aside class="sidebar" id="sidebar">
    <a href="/home" class="logo">
      <div class="logo-orb"></div>
      Aurora
    </a>

    <nav class="sidebar-nav">
      <a href="/home" class="nav-link active" data-section="home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Início
      </a>
      <a href="/biblioteca" class="nav-link" data-section="library">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
        Biblioteca
      </a>
      <a href="/curtidas" class="nav-link" data-section="curtidas">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3z"/></svg>
        Curtidas
      </a>
      <a href="/playlist" class="nav-link" data-section="playlists">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
        Playlists
      </a>
    </nav>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section-title">Suas Playlists</div>
    <div class="playlist-list" id="sidebarPlaylistList"></div>

    <div class="sidebar-bottom">
      <a href="/biblioteca" class="create-playlist-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Nova Playlist
      </a>
    </div>
  </aside>


  <main class="main-content">

    
    <header class="topbar">
      <button class="mobile-menu-btn" id="menuBtn" aria-label="Menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
      <div class="search-wrap" style="position:relative">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" opacity=".5"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" placeholder="O que você quer ouvir?" id="searchInput" autocomplete="off" />
        <div id="searchDropdown" style="display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:14px;z-index:999;max-height:420px;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.6)"></div>
      </div>
      <div class="topbar-right">
        <button class="icon-button" title="Notificações">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        </button>
        <div class="avatar-wrap" style="position:relative">
          <div class="user-avatar" id="userAvatar" onclick="toggleAvatarMenu()" style="cursor:pointer">GT</div>
          <div id="avatarMenu" style="display:none;position:absolute;top:48px;right:0;background:#1e1e2e;border:1px solid #333;border-radius:12px;padding:8px;min-width:180px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,0.4);">
            <div style="padding:8px 12px;color:#aaa;font-size:0.8rem;border-bottom:1px solid #333;margin-bottom:4px" id="menuNomeUsuario"></div>
            <a href="/perfil" style="display:block;padding:10px 12px;color:#fff;text-decoration:none;border-radius:8px;font-size:0.9rem" onmouseover="this.style.background='#2a2a3e'" onmouseout="this.style.background='transparent'">👤 Meu Perfil</a>
            <a id="adminLink" href="/admin" style="display:block;padding:10px 12px;color:#fff;text-decoration:none;border-radius:8px;font-size:0.9rem" onmouseover="this.style.background='#2a2a3e'" onmouseout="this.style.background='transparent'">⚙️ Painel Admin</a>
            <a href="/logout" style="display:block;padding:10px 12px;color:#f87171;text-decoration:none;border-radius:8px;font-size:0.9rem" onmouseover="this.style.background='#2a2a3e'" onmouseout="this.style.background='transparent'">🚪 Sair</a>
          </div>
        </div>
      </div>
    </header>

   
    <div class="scroll-area">

      
      <section class="greeting-section" data-reveal>
        <h1 class="greeting" id="greeting">Boa tarde</h1>
        <p class="greeting-sub">Continue de onde parou</p>
      </section>

      
      <div class="quick-grid" id="quickGrid" data-reveal></div>

      
      <section class="content-section" data-reveal>
        <div class="section-header">
          <h2>Catálogo Aurora</h2>
          <span style="font-size:0.8rem;color:#6b9997;opacity:.7">Curado pelo time Aurora</span>
        </div>
        <div class="card-row" id="adminPlaylistsRow"></div>
      </section>

      <section class="content-section" data-reveal>
        <div class="section-header">
          <h2>Suas Playlists</h2>
          <a href="/playlist" class="see-all">Ver tudo</a>
        </div>
        <div class="card-row" id="playlistsRow"></div>
      </section>

      
      <section class="content-section" data-reveal>
        <div class="section-header">
          <h2>Tocadas Recentemente</h2>
          <a href="/curtidas" class="see-all">Ver curtidas</a>
        </div>
        <div class="card-row" id="recentRow"></div>
      </section>

      <section class="content-section" data-reveal>
        <div class="section-header">
          <h2>Artistas</h2>
          <a href="/biblioteca" class="see-all">Ver tudo</a>
        </div>
        <div class="card-row" id="artistsRow"></div>
      </section>

    </div>
  </main>

 
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script src="/static/js/session_guard.js"></script>
  <script src="/static/js/player.js?v=5"></script>
  <script src="/static/js/homepage.js?v=3"></script>
</body>
</html>
